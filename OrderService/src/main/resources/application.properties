spring.application.name=OrderService
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/order_service
spring.datasource.username=root
spring.datasource.password=sapassword
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Auto-load data.sql on startup
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# External Services URLs
food.service.url=http://localhost:8001
user.service.url=http://localhost:8002

# Logging
logging.level.root=INFO
logging.level.iuh.fit.orderservice=DEBUG
